<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- if page.title -%}
    <title>{{ page.title | escape }} | {{ site.title | escape }}</title>
  {%- else -%}
    <title>{{ site.title | escape }}</title>
  {%- endif -%}
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  <link rel="shortcut icon" type="image/x-icon" href="{{ "/assets/favicon.ico" | relative_url }}">
  {%- if site.twitter_username -%}
    <meta name="twitter:site" content="@{{ site.twitter_username | escape }}">
    <meta name="twitter:creator" content="@{{ site.twitter_username | escape }}">
  {%- endif -%}
  {%- if page.title -%}
    <meta property="og:title" content="{{ page.title | escape }}">
  {%- else -%}
    <meta property="og:title" content="{{ site.title | escape }}">
  {%- endif -%}
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  {%- if site.google_analytics -%}
    <script>
      window.ga=window.ga||function(){(ga.q=ga.q||[]).push(arguments)};ga.l=+new Date;
      ga('create', '{{ site.google_analytics }}', 'auto');
      ga('send', 'pageview');
    </script>
    <script async src='https://www.google-analytics.com/analytics.js'></script>
  {%- endif -%}
</head>
