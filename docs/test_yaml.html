<!DOCTYPE html>
<html>
<head>
    <title>Test YAML Loading</title>
    <script src="js-yaml.min.js"></script>
</head>
<body>
    <h1>Testing YAML Loading</h1>
    <div id="result"></div>
    
    <script>
        async function testYamlLoading() {
            const resultDiv = document.getElementById('result');
            
            try {
                // Test if jsyaml is available
                if (typeof jsyaml === 'undefined') {
                    resultDiv.innerHTML = '<p style="color: red;">ERROR: jsyaml library not loaded</p>';
                    return;
                }
                
                resultDiv.innerHTML = '<p>jsyaml library loaded successfully!</p>';
                
                // Test fetching YAML
                const response = await fetch('external_links.yaml');
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                
                const yamlText = await response.text();
                resultDiv.innerHTML += '<p>YAML file fetched successfully!</p>';
                
                // Test parsing YAML
                const data = jsyaml.load(yamlText);
                resultDiv.innerHTML += '<p>YAML parsed successfully!</p>';
                resultDiv.innerHTML += '<p>Found ' + (data.external_links ? data.external_links.length : 0) + ' external links</p>';
                
                if (data.external_links && data.external_links.length > 0) {
                    resultDiv.innerHTML += '<ul>';
                    data.external_links.forEach(link => {
                        resultDiv.innerHTML += '<li>' + link.name + ' - ' + link.url + '</li>';
                    });
                    resultDiv.innerHTML += '</ul>';
                }
                
            } catch (error) {
                resultDiv.innerHTML += '<p style="color: red;">ERROR: ' + error.message + '</p>';
            }
        }
        
        testYamlLoading();
    </script>
</body>
</html>
